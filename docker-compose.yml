services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - sessions_data:/data
      - ./context.txt:/config/context.txt:ro
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sessions_data:
