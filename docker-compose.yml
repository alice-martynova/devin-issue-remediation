services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Forwarded from the host so `./run` can toggle verbose logging
      # without editing .env. Fall back to INFO for a plain `docker compose up`.
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - UVICORN_LOG_LEVEL=${UVICORN_LOG_LEVEL:-info}
    volumes:
      - sessions_data:/data
      - ./context.txt:/config/context.txt:ro
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sessions_data:
