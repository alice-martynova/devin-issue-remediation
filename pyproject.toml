[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/F/W: pyflakes + pycodestyle basics
# I: import sorting
# B: bugbear (real bugs, not style)
select = ["E", "F", "I", "W", "B"]
ignore = ["E501"]  # line length enforced loosely; long prompt strings are fine

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B017"]  # pytest.raises(Exception) is fine in tests
